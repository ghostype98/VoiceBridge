<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoiceBridge 面试系统 - 登录</title>
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/mobile.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
        }
        .login-container {
            min-height: 100vh;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 40px;
            box-sizing: border-box;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(15px);
            border-radius: 25px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.2);
            padding: 60px 80px;
            width: 100%;
            max-width: 600px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .login-header {
            margin-bottom: 40px;
        }

        .login-header h1 {
            color: #333;
            margin-bottom: 15px;
            font-size: 42px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .login-header p {
            color: #666;
            font-size: 20px;
            font-weight: 300;
            letter-spacing: 0.5px;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .form-group {
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 12px;
            color: #333;
            font-weight: 600;
            font-size: 18px;
            letter-spacing: 0.5px;
        }

        .form-group input {
            width: 100%;
            padding: 18px 24px;
            border: 2px solid #e1e5e9;
            border-radius: 15px;
            font-size: 18px;
            transition: all 0.3s ease;
            box-sizing: border-box;
            background: rgba(255, 255, 255, 0.9);
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .login-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 20px 40px;
            border-radius: 15px;
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 1px;
            text-transform: uppercase;
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        .login-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(102, 126, 234, 0.5);
            background: linear-gradient(135deg, #5a6fd8 0%, #6c4ba8 100%);
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .error-message {
            color: #dc3545;
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid #f5c6cb;
            border-radius: 12px;
            padding: 18px 24px;
            margin-top: 20px;
            display: none;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            font-size: 16px;
            font-weight: 500;
        }

        .success-message {
            color: #155724;
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid #c3e6cb;
            border-radius: 12px;
            padding: 18px 24px;
            margin-top: 20px;
            display: none;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            font-size: 16px;
            font-weight: 500;
        }

        .loading-spinner {
            display: none;
            margin: 0 auto;
            margin-bottom: 20px;
        }

        .loading-spinner i {
            font-size: 40px;
            color: #667eea;
        }

        @media (max-width: 768px) {
            .login-container {
                padding: 20px;
            }

            .login-card {
                padding: 40px 30px;
                max-width: 100%;
            }

            .login-header h1 {
                font-size: 36px;
            }

            .login-header p {
                font-size: 18px;
            }

            .form-group label {
                font-size: 16px;
            }

            .form-group input {
                padding: 16px 20px;
                font-size: 16px;
            }

            .login-btn {
                padding: 18px 35px;
                font-size: 18px;
            }
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 30px 20px;
            }

            .login-header h1 {
                font-size: 32px;
            }

            .login-header p {
                font-size: 16px;
            }

            .login-btn {
                padding: 16px 30px;
                font-size: 16px;
            }
        }

        /* 身份确认窗口样式 */
        .confirm-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            display: none;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(5px);
        }

        .confirm-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
            width: 90%;
            max-width: 400px;
            overflow: hidden;
            border: 2px solid #667eea;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-30px) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .confirm-header {
            padding: 25px 30px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
        }

        .confirm-header h3 {
            margin: 0;
            font-size: 24px;
            font-weight: 600;
        }

        .confirm-body {
            padding: 30px 35px;
            text-align: center;
            background: #f8f9fa;
        }

        .confirm-body p {
            margin: 0;
            font-size: 18px;
            color: #333;
            line-height: 1.6;
            font-weight: 500;
        }

        .confirm-actions {
            padding: 25px 35px 30px;
            display: flex;
            justify-content: center;
            gap: 20px;
            background: white;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-cancel {
            background: #6c757d;
            color: white;
        }

        .btn-cancel:hover {
            background: #5a6268;
        }

        .btn-confirm {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-confirm:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1><i class="fas fa-microphone-alt"></i>VoiceBridge</h1>
                <p>智能语音面试系统</p>
            </div>

            <div class="loading-spinner" id="loadingSpinner">
                <i class="fas fa-spinner fa-spin"></i>
            </div>

            <form class="login-form" id="loginForm">
                <div class="form-group">
                    <label for="username">用户名</label>
                    <input type="text" id="username" name="username" placeholder="请输入用户名" required>
                </div>

                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" name="password" placeholder="请输入密码" required>
                </div>

                <button type="submit" class="login-btn" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i> 登录
                </button>
            </form>

            <div class="error-message" id="errorMessage">
                用户名或密码错误，请重试。
            </div>

            <div class="success-message" id="successMessage">
                登录成功，正在跳转...
            </div>
        </div>
    </div>

    <!-- 身份确认窗口 -->
    <div class="confirm-container" id="confirmContainer">
        <div class="confirm-card">
            <div class="confirm-header">
                <h3 id="confirmTitle">面试身份确认</h3>
            </div>
            <div class="confirm-body">
                <p id="confirmMessage">请确认面试信息</p>
            </div>
            <div class="confirm-actions">
                <button class="btn btn-cancel" id="cancelBtn">取消</button>
                <button class="btn btn-confirm" id="confirmBtn">确认</button>
            </div>
        </div>
    </div>

    <script src="/static/js/api.js"></script>
    <script src="/static/js/login.js"></script>
</body>
</html>
